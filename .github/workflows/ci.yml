name: CI BomberEci Arena
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Variables mockeadas para que las pruebas nunca intenten hablar con
      # PostgreSQL/Redis reales: Redis y la capa de acceso a datos ya están
      # mockeados a nivel de módulo en server/tests/api/routes.test.js, pero
      # se dejan estos valores igual por si algún código lee process.env al
      # importarse (ninguno hoy, pero es la red de seguridad barata).
      NODE_ENV: test
      JWT_SECRET: mock-jwt-secret-para-ci
      JWT_EXPIRES_IN: 1h
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: mock
      DB_USER: mock
      DB_PASSWORD: mock
      REDIS_HOST: localhost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm test -- --coverage
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          if-no-files-found: ignore
