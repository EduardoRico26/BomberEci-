<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - BomberEci Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    h1 { color: #e94560; font-size: 2rem; }
    p { color: #aaa; }
    .card {
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 32px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    label { font-size: 0.85rem; color: #aaa; margin-bottom: 2px; }
    input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
      width: 100%;
    }
    input:focus { outline: none; border-color: #e94560; }
    .campo { display: flex; flex-direction: column; gap: 4px; }
    .error-campo {
      font-size: 0.78rem;
      color: #e94560;
      min-height: 16px;
    }
    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      background: #e94560;
      color: #fff;
      margin-top: 4px;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #mensaje-global {
      text-align: center;
      font-size: 0.9rem;
      min-height: 20px;
      padding: 8px;
      border-radius: 6px;
    }
    #mensaje-global.exito { background: #1a3a1a; color: #4caf50; }
    #mensaje-global.error { background: #3a1a1a; color: #e94560; }
    .link { text-align: center; font-size: 0.88rem; color: #aaa; }
    .link a { color: #e94560; text-decoration: none; }
    .link a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1> BomberEci Arena</h1>
  <p>Crea tu cuenta para jugar</p>

  <div class="card">
    <div class="campo">
      <label for="nombre">Nombre de jugador</label>
      <input id="nombre" type="text" placeholder="Ej: Bombero123" maxlength="50"/>
      <span class="error-campo" id="err-nombre"></span>
    </div>

    <div class="campo">
      <label for="correo">Correo electrónico</label>
      <input id="correo" type="email" placeholder="tucorreo@gmail.com"/>
      <span class="error-campo" id="err-correo"></span>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="Mínimo 8 caracteres"/>
      <span class="error-campo" id="err-password"></span>
    </div>

    <div class="campo">
      <label for="confirmar">Confirmar contraseña</label>
      <input id="confirmar" type="password" placeholder="Repite tu contraseña"/>
      <span class="error-campo" id="err-confirmar"></span>
    </div>

    <div id="mensaje-global"></div>

    <button id="btn-registro">Crear cuenta</button>

    <div class="link">
      ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('btn-registro');
    const mensajeEl = document.getElementById('mensaje-global');

    function mostrarError(id, texto) {
      document.getElementById(id).textContent = texto;
    }
    function limpiarErrores() {
      ['err-nombre','err-correo','err-password','err-confirmar'].forEach(id => {
        document.getElementById(id).textContent = '';
      });
      mensajeEl.className = '';
      mensajeEl.textContent = '';
    }

    function validarFormulario() {
      const nombre   = document.getElementById('nombre').value.trim();
      const correo   = document.getElementById('correo').value.trim();
      const password = document.getElementById('password').value;
      const confirmar = document.getElementById('confirmar').value;
      let valido = true;

      if (nombre.length < 3) {
        mostrarError('err-nombre', 'El nombre debe tener al menos 3 caracteres.');
        valido = false;
      }
      const regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!regexCorreo.test(correo)) {
        mostrarError('err-correo', 'El formato del correo no es válido.');
        valido = false;
      }
      if (password.length < 8) {
        mostrarError('err-password', 'La contraseña debe tener al menos 8 caracteres.');
        valido = false;
      }
      if (password !== confirmar) {
        mostrarError('err-confirmar', 'Las contraseñas no coinciden.');
        valido = false;
      }
      return valido;
    }

    btn.addEventListener('click', async () => {
      limpiarErrores();
      if (!validarFormulario()) return;

      const nombre   = document.getElementById('nombre').value.trim();
      const correo   = document.getElementById('correo').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creando cuenta...';

      try {
        const res = await fetch('/auth/registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, correo, password })
        });
        const data = await res.json();

        if (res.ok) {
          mensajeEl.className = 'exito';
          mensajeEl.textContent = data.mensaje + ' Redirigiendo al login...';
          btn.textContent = '¡Cuenta creada!';
          setTimeout(() => window.location.href = '/login.html', 3000);
        } else {
          mensajeEl.className = 'error';
          mensajeEl.textContent = data.mensaje;
          btn.disabled = false;
          btn.textContent = 'Crear cuenta';
        }
      } catch (err) {
        mensajeEl.className = 'error';
        mensajeEl.textContent = 'Error de conexión. Intenta de nuevo.';
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
