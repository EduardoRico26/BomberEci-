<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión - BomberEci Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    h1 { color: #e94560; font-size: 2rem; }
    p { color: #aaa; }
    .card {
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 32px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    label { font-size: 0.85rem; color: #aaa; }
    input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
      width: 100%;
      margin-top: 4px;
    }
    input:focus { outline: none; border-color: #e94560; }
    .campo { display: flex; flex-direction: column; }
    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      background: #e94560;
      color: #fff;
      margin-top: 4px;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #mensaje {
      text-align: center;
      font-size: 0.9rem;
      min-height: 20px;
      padding: 8px;
      border-radius: 6px;
    }
    #mensaje.exito { background: #1a3a1a; color: #4caf50; }
    #mensaje.error { background: #3a1a1a; color: #e94560; }
    #mensaje.info { background: #1a2a3a; color: #00b4d8; }
    .links {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }
    .links a { color: #e94560; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>💣 BomberEci Arena</h1>
  <p>Inicia sesión para jugar</p>

  <div class="card">
    <div class="campo">
      <label for="correo">Correo electrónico</label>
      <input id="correo" type="email" placeholder="tucorreo@gmail.com"/>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="Tu contraseña"/>
    </div>

    <div id="mensaje"></div>

    <button id="btn-login">Iniciar sesión</button>

    <div class="links">
      <a href="/registro.html">Crear cuenta</a>
      <a href="/recuperar.html">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('btn-login');
    const mensajeEl = document.getElementById('mensaje');

    // Verificar si viene de verificación exitosa
    const params = new URLSearchParams(window.location.search);
    if (params.get('verificado') === 'true') {
      mensajeEl.className = 'exito';
      mensajeEl.textContent = '¡Correo verificado! Ya puedes iniciar sesión.';
    }
    if (params.get('error') === 'token-invalido') {
      mensajeEl.className = 'error';
      mensajeEl.textContent = 'El enlace de verificación no es válido o ya expiró.';
    }

    btn.addEventListener('click', async () => {
      const correo   = document.getElementById('correo').value.trim();
      const password = document.getElementById('password').value;

      if (!correo || !password) {
        mensajeEl.className = 'error';
        mensajeEl.textContent = 'Completa todos los campos.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Iniciando sesión...';
      mensajeEl.className = '';
      mensajeEl.textContent = '';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo, password })
        });
        const data = await res.json();

        if (res.ok) {
          mensajeEl.className = 'exito';
          mensajeEl.textContent = data.mensaje;
          setTimeout(() => window.location.href = '/', 1000);
        } else {
          mensajeEl.className = 'error';
          mensajeEl.textContent = data.mensaje;
          btn.disabled = false;
          btn.textContent = 'Iniciar sesión';
        }
      } catch (err) {
        mensajeEl.className = 'error';
        mensajeEl.textContent = 'Error de conexión. Intenta de nuevo.';
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });

    // Permitir login con Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>
