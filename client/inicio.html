<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BomberEci Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    .logo {
      width: 220px;
      height: 220px;
      object-fit: contain;
      animation: flotar 3s ease-in-out infinite;
    }
    @keyframes flotar {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    .bienvenida {
      text-align: center;
      color: #aaa;
      font-size: 1rem;
    }
    .bienvenida span {
      color: #e94560;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .btn-play {
      padding: 16px 64px;
      font-size: 1.6rem;
      font-weight: bold;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 3px;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn-play:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px rgba(233, 69, 96, 0.8);
    }
    .btn-play:active { transform: scale(0.97); }
    .btn-logout {
      position: absolute;
      top: 20px;
      right: 24px;
      padding: 8px 18px;
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-logout:hover { border-color: #e94560; color: #e94560; }
  </style>
</head>
<body>

  <button class="btn-logout" id="btn-logout">Cerrar sesión</button>

  <img src="/logo.png" alt="BomberEci Arena" class="logo"/>

  <div class="bienvenida">
    Bienvenido, <span id="nombre-jugador">Jugador</span>
  </div>

  <button class="btn-play" onclick="window.location.href='/index.html'">
    ▶ PLAY
  </button>

  <script>
    // Verificar que el usuario está autenticado
    async function verificarSesion() {
      try {
        const res = await fetch('/auth/perfil');
        if (!res.ok) {
          window.location.href = '/login.html';
          return;
        }
        const data = await res.json();
        document.getElementById('nombre-jugador').textContent = data.usuario.nombre;
      } catch (err) {
        window.location.href = '/login.html';
      }
    }

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    verificarSesion();
  </script>
</body>
</html>
