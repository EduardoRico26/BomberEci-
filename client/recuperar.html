<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuperar contraseña - BomberEci Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e; color: #eee;
      font-family: Arial, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px;
    }
    h1 { color: #e94560; font-size: 2rem; }
    p { color: #aaa; text-align: center; max-width: 360px; }
    .card {
      background: #16213e; border: 1px solid #e94560;
      border-radius: 12px; padding: 32px; width: 380px;
      display: flex; flex-direction: column; gap: 14px;
    }
    label { font-size: 0.85rem; color: #aaa; }
    input {
      padding: 12px; border-radius: 8px;
      border: 1px solid #444; background: #0f3460;
      color: #fff; font-size: 1rem; width: 100%; margin-top: 4px;
    }
    input:focus { outline: none; border-color: #e94560; }
    button {
      padding: 12px; border-radius: 8px; border: none;
      font-size: 1rem; cursor: pointer; font-weight: bold;
      background: #e94560; color: #fff;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #mensaje {
      text-align: center; font-size: 0.9rem;
      min-height: 20px; padding: 8px; border-radius: 6px;
    }
    #mensaje.exito { background: #1a3a1a; color: #4caf50; }
    #mensaje.error { background: #3a1a1a; color: #e94560; }
    a { color: #e94560; text-decoration: none; font-size: 0.88rem; text-align: center; }
    a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>💣 BomberEci Arena</h1>
  <p>Ingresa tu correo y te enviaremos un enlace para recuperar tu contraseña.</p>

  <div class="card">
    <div>
      <label for="correo">Correo electrónico</label>
      <input id="correo" type="email" placeholder="tucorreo@gmail.com"/>
    </div>
    <div id="mensaje"></div>
    <button id="btn-recuperar">Enviar enlace</button>
    <a href="/login.html">← Volver al inicio de sesión</a>
  </div>

  <script>
    const btn = document.getElementById('btn-recuperar');
    const mensajeEl = document.getElementById('mensaje');

    btn.addEventListener('click', async () => {
      const correo = document.getElementById('correo').value.trim();
      if (!correo) {
        mensajeEl.className = 'error';
        mensajeEl.textContent = 'Ingresa tu correo.';
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Enviando...';
      mensajeEl.className = '';
      mensajeEl.textContent = '';

      try {
        const res = await fetch('/auth/recuperar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo })
        });
        const data = await res.json();
        mensajeEl.className = 'exito';
        mensajeEl.textContent = data.mensaje;
        btn.textContent = 'Enlace enviado';
      } catch (err) {
        mensajeEl.className = 'error';
        mensajeEl.textContent = 'Error de conexión. Intenta de nuevo.';
        btn.disabled = false;
        btn.textContent = 'Enviar enlace';
      }
    });
  </script>
</body>
</html>
