<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BomberEci Arena - Partida</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
    }
    h2 { color: #e94560; font-size: 1.4rem; }
    #info {
      display: flex;
      gap: 32px;
      font-size: 0.95rem;
      color: #aaa;
    }
    #info span { color: #fff; font-weight: bold; }
    canvas {
      border: 2px solid #e94560;
      border-radius: 8px;
    }
    #mensaje {
      font-size: 1.1rem;
      color: #e94560;
      min-height: 28px;
      font-weight: bold;
    }
    #controles {
      font-size: 0.8rem;
      color: #555;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #overlay.visible { display: flex; }
    #overlay h1 { color: #e94560; font-size: 2.5rem; }
    #overlay p { color: #eee; font-size: 1.2rem; }
    #overlay button {
      padding: 12px 32px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>💣 BomberEci Arena</h2>
  <div id="info">
    <div>Jugador: <span id="mi-nombre">-</span></div>
    <div>Sala: <span id="mi-sala">-</span></div>
    <div id="estado-conexion">Esperando jugadores...</div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="mensaje"></div>
  <div id="controles">Mover: flechas del teclado &nbsp;|&nbsp; Bomba: Espacio</div>

  <div id="overlay">
    <h1 id="overlay-titulo">Fin de partida</h1>
    <p id="overlay-texto"></p>
    <button onclick="window.location.href='/'">Volver al lobby</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const TILE = 40;
    const COLORES = {
      0: '#2d2d2d',   // celda libre
      1: '#8B4513',   // bloque destructible
      2: '#555'       // bloque indestructible
    };
    const COLORES_JUGADOR = ['#e94560', '#00b4d8'];

    const params = new URLSearchParams(window.location.search);
    const salaId = params.get('sala');
    const nombre = params.get('nombre');

    document.getElementById('mi-nombre').textContent = nombre;
    document.getElementById('mi-sala').textContent = salaId;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const socket = io();

    let estado = null;
    let miId = null;
    let explosiones = [];

    socket.on('connect', () => {
        miId = socket.id;
        if (salaId && nombre) {
            socket.emit('unirse_sala', { salaId, nombre });
        }
        });

    socket.on('partida_lista', ({ salaId }) => {
        socket.emit('listo_para_jugar', { salaId });
    });

    socket.on('iniciar_partida', (estadoInicial) => {
      estado = estadoInicial;
      canvas.width = estado.mapa[0].length * TILE;
      canvas.height = estado.mapa.length * TILE;
      document.getElementById('estado-conexion').textContent = '¡Partida en curso!';
      document.getElementById('estado-conexion').style.color = '#4caf50';
      dibujar();
    });

    socket.on('estado_juego', (nuevoEstado) => {
      estado = nuevoEstado;
      dibujar();
    });

    socket.on('explosion', ({ celdas, eliminados }) => {
      explosiones = celdas;
      dibujar();
      setTimeout(() => { explosiones = []; dibujar(); }, 400);
      if (eliminados.includes(miId)) {
        document.getElementById('mensaje').textContent = '💀 Fuiste eliminado';
      }
    });

    socket.on('fin_partida', ({ ganador }) => {
      const overlay = document.getElementById('overlay');
      const titulo = document.getElementById('overlay-titulo');
      const texto = document.getElementById('overlay-texto');
      if (ganador === 'empate') {
        titulo.textContent = '¡Empate!';
        texto.textContent = 'Ambos jugadores fueron eliminados al mismo tiempo.';
      } else if (ganador === nombre) {
        titulo.textContent = '🏆 ¡Ganaste!';
        texto.textContent = `${ganador} es el campeón de esta partida.`;
      } else {
        titulo.textContent = '💀 Perdiste';
        texto.textContent = `${ganador} ganó esta partida.`;
      }
      overlay.classList.add('visible');
    });

    socket.on('jugador_salio', () => {
      document.getElementById('mensaje').textContent = 'El otro jugador se desconectó.';
    });

    function dibujar() {
      if (!estado) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Dibujar mapa
      for (let y = 0; y < estado.mapa.length; y++) {
        for (let x = 0; x < estado.mapa[y].length; x++) {
          ctx.fillStyle = COLORES[estado.mapa[y][x]] || '#2d2d2d';
          ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
          ctx.strokeStyle = '#1a1a2e';
          ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
        }
      }

      // Dibujar explosiones
      explosiones.forEach(c => {
        ctx.fillStyle = '#ff6b00';
        ctx.fillRect(c.x * TILE, c.y * TILE, TILE, TILE);
      });

      // Dibujar bombas
      estado.bombas.forEach(b => {
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(b.x * TILE + TILE/2, b.y * TILE + TILE/2, TILE/2 - 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#e94560';
        ctx.beginPath();
        ctx.arc(b.x * TILE + TILE/2 + 8, b.y * TILE + 6, 4, 0, Math.PI * 2);
        ctx.fill();
      });

      // Dibujar jugadores
      estado.jugadores.forEach((j, i) => {
        if (!j.vivo) return;
        const color = j.id === miId ? COLORES_JUGADOR[0] : COLORES_JUGADOR[1];
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(j.x * TILE + TILE/2, j.y * TILE + TILE/2, TILE/2 - 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(j.nombre.substring(0,6), j.x * TILE + TILE/2, j.y * TILE + TILE/2 + 4);
      });
    }

    // Controles
    const teclasPres = {};
    document.addEventListener('keydown', (e) => {
      if (teclasPres[e.code]) return;
      teclasPres[e.code] = true;

      const mapa = {
        ArrowUp: 'up', ArrowDown: 'down',
        ArrowLeft: 'left', ArrowRight: 'right'
      };
      if (mapa[e.code]) {
        e.preventDefault();
        socket.emit('mover', { direccion: mapa[e.code] });
      }
      if (e.code === 'Space') {
        e.preventDefault();
        socket.emit('bomba');
      }
    });

    document.addEventListener('keyup', (e) => { delete teclasPres[e.code]; });
  </script>
</body>
</html>
