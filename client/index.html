<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BomberEci Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
    }
    h1 { font-size: 2.2rem; color: #e94560; }
    p { color: #aaa; }
    .card {
      background: #16213e;
      border: 1px solid #e94560;
      border-radius: 12px;
      padding: 32px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f3460;
      color: #fff;
      font-size: 1rem;
    }
    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    #btn-crear { background: #e94560; color: #fff; }
    #mensaje { text-align: center; color: #aaa; font-size: 0.9rem; min-height: 20px; }
    .sala-item {
      background: #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      font-size: 0.9rem;
    }
    .sala-item:hover { border-color: #e94560; }

    /* VISTA JUEGO */
    #vista-juego {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #info-juego {
      display: flex;
      gap: 24px;
      font-size: 0.9rem;
      color: #aaa;
    }
    #info-juego span { color: #fff; font-weight: bold; }
    canvas { border: 2px solid #e94560; border-radius: 8px; }
    #msg-juego { color: #e94560; font-weight: bold; min-height: 24px; }
    #controles { font-size: 0.8rem; color: #555; }

    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #overlay.visible { display: flex; }
    #overlay h2 { color: #e94560; font-size: 2rem; }
    #overlay p { color: #eee; font-size: 1.1rem; }
    #overlay button {
      padding: 12px 32px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- VISTA LOBBY -->
  <div id="vista-lobby">
    <h1>💣 BomberEci Arena</h1>
    <p>Videojuego multijugador en tiempo real</p>
    <div class="card">
      <input id="nombre" type="text" placeholder="Tu nombre de jugador" maxlength="16"/>
      <button id="btn-crear">Crear sala</button>
      <hr style="border-color:#333"/>
      <div id="salas"></div>
      <div id="mensaje">Conectando...</div>
    </div>
  </div>

  <!-- VISTA JUEGO -->
  <div id="vista-juego">
    <h1 style="font-size:1.4rem">💣 BomberEci Arena</h1>
    <div id="info-juego">
      <div>Jugador: <span id="mi-nombre-juego">-</span></div>
      <div>Sala: <span id="mi-sala-juego">-</span></div>
      <div id="estado-partida" style="color:#aaa">Esperando jugadores...</div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="msg-juego"></div>
    <div id="controles">Mover: flechas ← ↑ → ↓ &nbsp;|&nbsp; Bomba: Espacio</div>
  </div>

  <!-- OVERLAY FIN DE PARTIDA -->
  <div id="overlay">
    <h2 id="overlay-titulo"></h2>
    <p id="overlay-texto"></p>
    <button onclick="location.reload()">Volver al lobby</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── CONSTANTES ──────────────────────────────────────────
    const TILE = 40;
    const COLORES = { 0: '#2d2d2d', 1: '#8B4513', 2: '#555' };
    const COL_JUGADORES = ['#e94560', '#00b4d8'];

    // ── ESTADO LOCAL ────────────────────────────────────────
    let miNombre = '';
    let miSalaId = '';
    let miId = '';
    let estadoJuego = null;
    let explosiones = [];

    // ── ELEMENTOS ───────────────────────────────────────────
    const vistaLobby  = document.getElementById('vista-lobby');
    const vistaJuego  = document.getElementById('vista-juego');
    const mensajeEl   = document.getElementById('mensaje');
    const salasEl     = document.getElementById('salas');
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');

    // ── SOCKET ──────────────────────────────────────────────
    const socket = io();

    socket.on('connect', () => {
      miId = socket.id;
      mensajeEl.textContent = 'Conectado. Crea o únete a una sala.';
      socket.emit('pedir_salas');
    });

    // ── LOBBY EVENTOS ───────────────────────────────────────
    socket.on('lista_salas', (salas) => {
      salasEl.innerHTML = '';
      if (salas.length === 0) {
        salasEl.innerHTML = '<div style="color:#555;font-size:0.85rem">No hay salas disponibles</div>';
        return;
      }
      salas.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sala-item';
        div.textContent = `Sala ${s.id} — ${s.jugadores}/2 jugadores`;
        div.addEventListener('click', () => unirseASala(s.id));
        salasEl.appendChild(div);
      });
    });

    setInterval(() => socket.emit('pedir_salas'), 2000);

    document.getElementById('btn-crear').addEventListener('click', () => {
      const nombre = document.getElementById('nombre').value.trim();
      if (!nombre) { mensajeEl.textContent = 'Escribe tu nombre primero.'; return; }
      miNombre = nombre;
      socket.emit('crear_sala', { nombre });
    });

    socket.on('sala_creada', ({ salaId }) => {
      miSalaId = salaId;
      mensajeEl.textContent = `Sala ${salaId} creada. Esperando otro jugador...`;
    });

    function unirseASala(salaId) {
      const nombre = document.getElementById('nombre').value.trim();
      if (!nombre) { mensajeEl.textContent = 'Escribe tu nombre primero.'; return; }
      miNombre = nombre;
      miSalaId = salaId;
      socket.emit('unirse_sala', { salaId, nombre });
    }

    // ── INICIO DE PARTIDA ───────────────────────────────────
    socket.on('iniciar_partida', (estado) => {
      estadoJuego = estado;
      miId = socket.id;

      canvas.width  = estado.mapa[0].length * TILE;
      canvas.height = estado.mapa.length    * TILE;

      document.getElementById('mi-nombre-juego').textContent = miNombre;
      document.getElementById('mi-sala-juego').textContent   = miSalaId;
      document.getElementById('estado-partida').textContent  = '¡Partida en curso!';
      document.getElementById('estado-partida').style.color  = '#4caf50';

      vistaLobby.style.display = 'none';
      vistaJuego.style.display = 'flex';

      dibujar();
    });

    // ── EVENTOS DE JUEGO ────────────────────────────────────
    socket.on('estado_juego', (nuevoEstado) => {
      estadoJuego = nuevoEstado;
      dibujar();
    });

    socket.on('explosion', ({ celdas, eliminados }) => {
      explosiones = celdas;
      dibujar();
      setTimeout(() => { explosiones = []; dibujar(); }, 400);
      if (eliminados.includes(miId)) {
        document.getElementById('msg-juego').textContent = '💀 Fuiste eliminado';
      }
    });

    socket.on('fin_partida', ({ ganador }) => {
      const overlay = document.getElementById('overlay');
      const titulo  = document.getElementById('overlay-titulo');
      const texto   = document.getElementById('overlay-texto');
      if (ganador === 'empate') {
        titulo.textContent = '¡Empate!';
        texto.textContent  = 'Ambos jugadores fueron eliminados simultáneamente.';
      } else if (ganador === miNombre) {
        titulo.textContent = '🏆 ¡Ganaste!';
        texto.textContent  = `¡Felicidades ${ganador}!`;
      } else {
        titulo.textContent = '💀 Perdiste';
        texto.textContent  = `${ganador} ganó esta partida.`;
      }
      overlay.classList.add('visible');
    });

    socket.on('jugador_salio', () => {
      document.getElementById('msg-juego').textContent = '⚠️ El otro jugador se desconectó.';
    });

    // ── DIBUJO ──────────────────────────────────────────────
    function dibujar() {
      if (!estadoJuego) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      estadoJuego.mapa.forEach((fila, y) => {
        fila.forEach((celda, x) => {
          ctx.fillStyle = COLORES[celda] || '#2d2d2d';
          ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
          ctx.strokeStyle = '#1a1a2e';
          ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
        });
      });

      explosiones.forEach(c => {
        ctx.fillStyle = '#ff6b00';
        ctx.fillRect(c.x * TILE, c.y * TILE, TILE, TILE);
      });

      estadoJuego.bombas.forEach(b => {
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.arc(b.x * TILE + TILE/2, b.y * TILE + TILE/2, TILE/2 - 5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#e94560';
        ctx.beginPath();
        ctx.arc(b.x * TILE + TILE/2 + 8, b.y * TILE + 6, 4, 0, Math.PI*2);
        ctx.fill();
      });

      estadoJuego.jugadores.forEach((j, i) => {
        if (!j.vivo) return;
        ctx.fillStyle = j.id === miId ? COL_JUGADORES[0] : COL_JUGADORES[1];
        ctx.beginPath();
        ctx.arc(j.x * TILE + TILE/2, j.y * TILE + TILE/2, TILE/2 - 4, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(j.nombre.substring(0,6), j.x * TILE + TILE/2, j.y * TILE + TILE/2 + 4);
      });
    }

    // ── CONTROLES ───────────────────────────────────────────
    const teclasActivas = {};
    document.addEventListener('keydown', (e) => {
      if (teclasActivas[e.code]) return;
      teclasActivas[e.code] = true;
      const mapa = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right' };
      if (mapa[e.code]) { e.preventDefault(); socket.emit('mover', { direccion: mapa[e.code] }); }
      if (e.code === 'Space') { e.preventDefault(); socket.emit('bomba'); }
    });
    document.addEventListener('keyup', (e) => delete teclasActivas[e.code]);
  </script>
</body>
</html>
