<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nueva contraseña - BomberEci Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e; color: #eee;
      font-family: Arial, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px;
    }
    h1 { color: #e94560; font-size: 2rem; }
    .card {
      background: #16213e; border: 1px solid #e94560;
      border-radius: 12px; padding: 32px; width: 380px;
      display: flex; flex-direction: column; gap: 14px;
    }
    label { font-size: 0.85rem; color: #aaa; }
    input {
      padding: 12px; border-radius: 8px;
      border: 1px solid #444; background: #0f3460;
      color: #fff; font-size: 1rem; width: 100%; margin-top: 4px;
    }
    input:focus { outline: none; border-color: #e94560; }
    button {
      padding: 12px; border-radius: 8px; border: none;
      font-size: 1rem; cursor: pointer; font-weight: bold;
      background: #e94560; color: #fff;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #mensaje {
      text-align: center; font-size: 0.9rem;
      min-height: 20px; padding: 8px; border-radius: 6px;
    }
    #mensaje.exito { background: #1a3a1a; color: #4caf50; }
    #mensaje.error { background: #3a1a1a; color: #e94560; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>💣 BomberEci Arena</h1>

  <div class="card">
    <h3 style="color:#eee">Nueva contraseña</h3>
    <div>
      <label for="password">Nueva contraseña</label>
      <input id="password" type="password" placeholder="Mínimo 8 caracteres"/>
    </div>
    <div>
      <label for="confirmar">Confirmar contraseña</label>
      <input id="confirmar" type="password" placeholder="Repite la contraseña"/>
    </div>
    <div id="mensaje"></div>
    <button id="btn-guardar">Guardar contraseña</button>
  </div>

  <script>
    const btn = document.getElementById('btn-guardar');
    const mensajeEl = document.getElementById('mensaje');
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      mensajeEl.className = 'error';
      mensajeEl.textContent = 'Enlace inválido. Solicita uno nuevo.';
      btn.disabled = true;
    }

    btn.addEventListener('click', async () => {
      const password  = document.getElementById('password').value;
      const confirmar = document.getElementById('confirmar').value;

      if (password.length < 8) {
        mensajeEl.className = 'error';
        mensajeEl.textContent = 'La contraseña debe tener al menos 8 caracteres.';
        return;
      }
      if (password !== confirmar) {
        mensajeEl.className = 'error';
        mensajeEl.textContent = 'Las contraseñas no coinciden.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Guardando...';

      try {
        const res = await fetch('/auth/nueva-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (res.ok) {
          mensajeEl.className = 'exito';
          mensajeEl.textContent = data.mensaje;
          setTimeout(() => window.location.href = '/login.html', 2000);
        } else {
          mensajeEl.className = 'error';
          mensajeEl.textContent = data.mensaje;
          btn.disabled = false;
          btn.textContent = 'Guardar contraseña';
        }
      } catch (err) {
        mensajeEl.className = 'error';
        mensajeEl.textContent = 'Error de conexión.';
        btn.disabled = false;
        btn.textContent = 'Guardar contraseña';
      }
    });
  </script>
</body>
</html>
